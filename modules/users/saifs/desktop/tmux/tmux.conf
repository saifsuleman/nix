set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

set-option -g prefix C-b
bind-key C-b send-prefix

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# pane movement
bind-key J command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key S command-prompt -p "send pane to:"  "join-pane -t '%%'"

# --- Appearance (ayu-dark) ---

# Pane borders
set -g pane-border-style "fg=#565b66"
set -g pane-active-border-style "fg=#e6b450"

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#0d1017 fg=#565b66"

# Left: session name
set -g status-left "#[fg=#0d1017,bg=#e6b450,bold] #S #[fg=#e6b450,bg=#0d1017] "
set -g status-left-length 30

# Right: time
set -g status-right "#[fg=#565b66] %H:%M #[fg=#0d1017,bg=#ff8f40,bold] %d-%b "
set -g status-right-length 30

# Window list
set -g window-status-format "#[fg=#565b66] #I:#W "
set -g window-status-current-format "#[fg=#e6b450,bold] #I:#W "
set -g window-status-separator ""

# Message style
set -g message-style "bg=#e6b450 fg=#0d1017"
